<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الروابي | تسجيل الدخول</title>
    <link rel="stylesheet" href="/bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/css/bootstrap.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container-fluid p-0">
        <div class="row g-0 login-container">
            
            <div class="col-md-6 side-image d-none d-md-flex"></div>
            <div class="col-md-6 col-12 login-section">
                <div class="w-100" style="max-width: 450px;">
                    <div class="text-center mb-5">
                        <p class="gold-text mb-0">Real Estate</p>
                        <h2 class="brand-name">EL RAWABI</h2>
                    </div>

                    <form>
                        <div class="mb-4">
                            <label class="small fw-bold text-muted text-uppercase mb-2">البريد الإلكتروني</label>
                            <input type="email" class="form-control" placeholder="Example@gmail.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="small fw-bold text-muted text-uppercase mb-2">كلمة المرور</label>
                            <input type="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        
                        <button type="submit" class="btn-submit w-100 shadow-sm">
                            تسجيل الدخول
                        </button>
                    </form>

                    <footer class="text-center mt-5 text-muted small">
                        &copy; 2026 شركة الروابي للتطوير العقاري
                    </footer>
                </div>
            </div>

        </div>
    </div>

    <script src="/bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/js/bootstrap.js"></script>
    <script src="/script.js"></script>
</body>
</html>
