<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>نظام تتبع العقارات | الروابي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/project.css">
</head>

<body>

    <div id="layout-root"></div>

    <div class="modal fade" id="projectModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow border-0" style="border-radius: 15px;">
                <div class="modal-header border-0 p-4 pb-0">
                    <h5 class="fw-bold" id="modalTitle">بيانات المشروع</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="projectForm">
                        <input type="hidden" id="projectId">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">اسم المشروع</label>
                            <input type="text" id="pName" class="form-control" style="border-radius: 8px;" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">الموقع</label>
                            <input type="text" id="pLocation" class="form-control" style="border-radius: 8px;" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">الوصف</label>
                            <textarea id="pDescription" class="form-control" rows="3" style="border-radius: 8px;" required></textarea>
                        </div>
                        <button type="submit" class="save-btn" id="saveBtn">حفظ البيانات</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="deleteProjectModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content p-4 text-center border-0" style="border-radius: 15px;">
                <div class="text-danger mb-3"><i class="fa-solid fa-circle-exclamation fa-3x"></i></div>
                <h6 class="fw-bold">تأكيد حذف المشروع؟</h6>
                <div class="d-flex gap-2 mt-4">
                    <button class="btn btn-light flex-grow-1" data-bs-dismiss="modal">إلغاء</button>
                    <button id="confirmDeleteBtn" class="btn btn-danger flex-grow-1">حذف</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/script/projects.js"></script>
</body>

</html>
